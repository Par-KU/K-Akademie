<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KÜ AKADEMIE — Adquirir Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7c6af7;--purple-dim:#5548c8;--purple-light:rgba(124,106,247,0.12);
  --teal:#4ecdc4;--bg:#0a0b10;--surface:#11121a;--surface2:#181926;--surface3:#1e2035;
  --border:#1e2035;--border2:#252640;--text:#e8e8f0;--muted:#6b6d8a;--muted2:#3a3d58;
  --green:#4caf82;--green-light:rgba(76,175,130,0.12);
  --amber:#f0b942;--red:#e05555;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:50;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:14px;height:52px;
}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.tb-icon{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--purple);position:relative;flex-shrink:0}
.tb-icon::before{content:'';position:absolute;width:12px;height:1.5px;background:var(--teal);border-radius:1px;transform:rotate(-35deg);top:7px;left:3px}
.tb-icon::after{content:'';position:absolute;width:9px;height:1.5px;background:var(--purple);border-radius:1px;transform:rotate(-35deg);bottom:7px;right:2px}
.tb-brand{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff}
.tb-brand em{font-style:normal;color:var(--purple)}
.tb-back{display:flex;align-items:center;gap:5px;text-decoration:none;color:var(--muted);font-size:12px;font-weight:500;padding:5px 10px;border-radius:7px;border:1px solid var(--border);transition:all .15s;margin-left:auto}
.tb-back:hover{color:#fff;border-color:var(--purple);background:var(--purple-light)}
.tb-back svg{transition:transform .15s}
.tb-back:hover svg{transform:translateX(-2px)}

/* MAIN */
.page{max-width:860px;margin:0 auto;padding:36px 20px 60px}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--surface3);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted)}

/* COURSE HERO */
.course-hero{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  overflow:hidden;margin-bottom:24px;
}
.hero-thumb{
  height:200px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1a1040,#0d1a2e);
  display:flex;align-items:center;justify-content:center;
}
.hero-thumb img{width:100%;height:100%;object-fit:cover;object-position:center}
.hero-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(10,11,16,.85))}
.hero-thumb-emoji{font-size:64px;position:relative;z-index:1}
.hero-body{padding:20px 24px 24px}
.hero-cat{font-size:11px;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px}
.hero-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.hero-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.hero-meta span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.hero-desc{font-size:13px;color:rgba(232,232,240,.75);line-height:1.8}
.price-row{display:flex;align-items:baseline;gap:10px;margin-top:14px}
.price-old{font-size:14px;color:var(--muted2);text-decoration:line-through}
.price-now{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:#fff}
.price-save{font-size:12px;background:var(--green-light);color:var(--green);border:1px solid rgba(76,175,130,.3);border-radius:6px;padding:2px 8px;font-weight:600}

/* STEPS */
.steps-row{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-item{display:flex;align-items:center;gap:0;flex:1}
.step-circle{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
  border:2px solid var(--border2);color:var(--muted);background:var(--surface);
  font-family:'Sora',sans-serif;transition:all .3s;
}
.step-circle.active{border-color:var(--purple);color:var(--purple);background:var(--purple-light)}
.step-circle.done{border-color:var(--green);color:var(--green);background:var(--green-light)}
.step-label{font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap}
.step-label.active{color:var(--text)}
.step-line{flex:1;height:1px;background:var(--border);margin:0 8px}

/* PAYMENT CARD */
.pay-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:24px;margin-bottom:20px;
}
.pay-card-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pay-card-sub{font-size:12px;color:var(--muted);margin-bottom:20px}

/* BANK DATA */
.bank-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.bank-field{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.bank-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:5px}
.bank-value{font-family:'Sora',sans-serif;font-size:15px;font-weight:600;color:#fff;word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:8px}
.bank-value.mono{font-family:monospace;font-size:13px;letter-spacing:.5px}
.copy-btn{
  background:var(--surface3);border:1px solid var(--border2);border-radius:6px;
  padding:4px 8px;font-size:10px;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.copy-btn:hover{border-color:var(--purple);color:var(--purple)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}
.bank-field.full{grid-column:1/-1}
.bank-field.highlight{border-color:rgba(124,106,247,.35);background:var(--purple-light)}
.bank-field.highlight .bank-label{color:var(--purple)}

/* INSTRUCTIONS */
.instructions{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.instructions ol{padding-left:18px;display:flex;flex-direction:column;gap:8px}
.instructions li{font-size:13px;color:rgba(232,232,240,.8);line-height:1.6}
.instructions li strong{color:#fff}

/* NOTICE */
.notice{
  background:rgba(240,185,66,.06);border:1px solid rgba(240,185,66,.2);
  border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;
  margin-bottom:20px;
}
.notice-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.notice-text{font-size:13px;color:var(--amber);line-height:1.6}

/* WA BUTTON */
.wa-btn{
  width:100%;background:linear-gradient(135deg,#25D366,#128C7E);
  border:none;border-radius:14px;padding:16px 20px;
  font-family:'Sora',sans-serif;font-size:15px;font-weight:700;
  color:#fff;cursor:pointer;transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(37,211,102,.25);
}
.wa-btn:hover{opacity:.92;transform:translateY(-1px)}
.wa-btn:active{transform:translateY(0)}
.wa-btn svg{flex-shrink:0}
.wa-btn-sub{font-size:12px;font-weight:400;opacity:.85;display:block;margin-top:3px}

/* SECURITY BADGES */
.security-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.sec-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}

/* ERROR STATE */
.error-state{text-align:center;padding:60px 20px}
.error-icon{font-size:48px;margin-bottom:14px}
.error-title{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;color:#fff;margin-bottom:8px}
.error-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.btn-back{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;text-decoration:none;display:inline-block}
.btn-back:hover{background:var(--purple-dim)}

/* RESPONSIVE */
@media(max-width:600px){
  .page{padding:20px 14px 60px}
  .bank-grid{grid-template-columns:1fr}
  .bank-field.full{grid-column:1}
  .hero-body{padding:16px}
  .hero-title{font-size:17px}
  .steps-row{overflow-x:auto;padding-bottom:4px}
  .step-label{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="tb-logo" href="dashboard.html">
    <div class="tb-icon"></div>
    <span class="tb-brand">KÜ <em>Akademie</em></span>
  </a>
  <a class="tb-back" href="dashboard.html">
    <svg width="14" height="14" fill="none" viewBox="0 0 14 14"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Volver
  </a>
</div>

<div class="page" id="pageContent">
  <div class="loading-wrap" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando información del curso...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBEXEQArv1biBw-ZTQUt9QOsP4BalV8BIY",
  authDomain: "nexora-914f6.firebaseapp.com",
  projectId: "nexora-914f6",
  storageBucket: "nexora-914f6.firebasestorage.app",
  messagingSenderId: "1042987858149",
  appId: "1:1042987858149:web:f647c9e9caa0d8dee93c0c"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

// Leer courseId de la URL
const params   = new URLSearchParams(window.location.search);
const courseId = params.get('id');

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }

  if (!courseId) {
    showError('No se especificó un curso', 'Vuelve al dashboard y selecciona un curso para adquirir.');
    return;
  }

  try {
    // Cargar curso y datos de pago en paralelo
    const [courseSnap, paySnap] = await Promise.all([
      getDoc(doc(db, 'courses', courseId)),
      getDoc(doc(db, 'config', 'payment'))
    ]);

    if (!courseSnap.exists()) {
      showError('Curso no encontrado', 'El curso que buscas no existe o fue eliminado.');
      return;
    }

    const course  = { id: courseSnap.id, ...courseSnap.data() };
    const payment = paySnap.exists() ? paySnap.data() : {};

    renderPage(course, payment, user);
  } catch(e) {
    showError('Error de conexión', 'No se pudo cargar la información. Intenta de nuevo más tarde.');
  }
});

function renderPage(course, payment, user) {
  const totalLessons = course.units
    ? course.units.reduce((s,u) => s + (u.lessons||[]).length, 0)
    : (course.lessons||[]).length;

  const thumbHTML = course.imageUrl
    ? `<img src="${course.imageUrl}" alt="${course.title}">`
    : `<div class="hero-thumb-emoji">${course.emoji || '📚'}</div>`;

  const priceHTML = course.price
    ? `<div class="price-row">
        ${course.priceOld ? `<span class="price-old">${course.priceOld}</span>` : ''}
        <span class="price-now">${course.price}</span>
        ${course.priceOld ? `<span class="price-save">Oferta especial</span>` : ''}
       </div>`
    : '';

  // Datos bancarios desde Firestore (con fallbacks)
  const banco    = payment.banco    || '—';
  const titular  = payment.titular  || '—';
  const clabe    = payment.clabe    || '—';
  const cuenta   = payment.cuenta   || '—';
  const concepto = payment.concepto || `Curso: ${course.title}`;
  const waNumber = payment.whatsapp || '5523202164';
  const nota     = payment.nota     || '';

  // Mensaje WhatsApp pre-escrito
  const studentName = user.email?.split('@')[0] || 'Estudiante';
  const waMsg = `Hola, acabo de realizar el pago del curso *${course.title}* (${course.price || 'precio acordado'}).\n\n📋 *Datos del pago:*\nBanco: ${banco}\nTitular: ${titular}\nConcepto: ${concepto}\n\nMi correo de acceso: ${user.email}\n\n📎 Adjunto mi comprobante de pago. Por favor, activen mi acceso. ¡Gracias!`;

  document.getElementById('pageContent').innerHTML = `

    <!-- STEPS -->
    <div class="steps-row">
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <span class="step-label">Elegiste tu curso</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-circle active">2</div>
        <span class="step-label active">Realiza el pago</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-circle">3</div>
        <span class="step-label">Envía comprobante</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-circle">4</div>
        <span class="step-label">Accede al curso</span>
      </div>
    </div>

    <!-- COURSE HERO -->
    <div class="course-hero">
      <div class="hero-thumb">
        ${thumbHTML}
        <div class="hero-thumb-overlay"></div>
      </div>
      <div class="hero-body">
        <div class="hero-cat">${course.category || 'Curso'}</div>
        <div class="hero-title">${course.title}</div>
        <div class="hero-meta">
          ${course.instructor ? `<span>👤 ${course.instructor}</span>` : ''}
          ${totalLessons ? `<span>📹 ${totalLessons} lecciones</span>` : ''}
          ${course.duration ? `<span>⏱ ${course.duration}</span>` : ''}
          ${course.rating ? `<span>⭐ ${course.rating}</span>` : ''}
        </div>
        ${course.desc ? `<div class="hero-desc">${course.desc}</div>` : ''}
        ${priceHTML}
      </div>
    </div>

    <!-- DATOS DE PAGO -->
    <div class="pay-card">
      <div class="pay-card-title">🏦 Datos para realizar tu transferencia</div>
      <div class="pay-card-sub">Realiza una transferencia bancaria con los siguientes datos</div>

      <div class="bank-grid">
        <div class="bank-field">
          <div class="bank-label">Banco</div>
          <div class="bank-value">${banco}</div>
        </div>
        <div class="bank-field">
          <div class="bank-label">Titular de la cuenta</div>
          <div class="bank-value">${titular}</div>
        </div>
        <div class="bank-field highlight full">
          <div class="bank-label">CLABE Interbancaria</div>
          <div class="bank-value mono">
            <span id="clabeVal">${clabe}</span>
            <button class="copy-btn" onclick="copyText('clabeVal',this)">📋 Copiar</button>
          </div>
        </div>
        ${cuenta && cuenta !== '—' ? `
        <div class="bank-field">
          <div class="bank-label">Número de cuenta</div>
          <div class="bank-value mono">
            <span id="cuentaVal">${cuenta}</span>
            <button class="copy-btn" onclick="copyText('cuentaVal',this)">📋 Copiar</button>
          </div>
        </div>` : ''}
        <div class="bank-field ${cuenta && cuenta !== '—' ? '' : 'full'}">
          <div class="bank-label">Concepto / Referencia</div>
          <div class="bank-value" style="font-size:13px">
            <span id="conceptoVal">${concepto}</span>
            <button class="copy-btn" onclick="copyText('conceptoVal',this)">📋 Copiar</button>
          </div>
        </div>
        ${course.price ? `
        <div class="bank-field full" style="border-color:rgba(76,175,130,.35);background:var(--green-light)">
          <div class="bank-label" style="color:var(--green)">Monto a transferir</div>
          <div class="bank-value" style="font-family:'Sora',sans-serif;font-size:20px;color:var(--green)">${course.price}</div>
        </div>` : ''}
      </div>

      ${nota ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.6;margin-top:4px">ℹ️ ${nota}</div>` : ''}
    </div>

    <!-- INSTRUCCIONES -->
    <div class="pay-card">
      <div class="pay-card-title">📋 ¿Cómo completar tu compra?</div>
      <div class="pay-card-sub">Sigue estos pasos para activar tu acceso</div>
      <div class="instructions">
        <ol>
          <li><strong>Realiza la transferencia</strong> al banco y CLABE mostrados arriba por el monto exacto del curso.</li>
          <li><strong>Toma una captura</strong> o descarga el comprobante de tu transferencia bancaria.</li>
          <li><strong>Toca el botón de WhatsApp</strong> — se abrirá con un mensaje ya redactado con tus datos.</li>
          <li><strong>Adjunta tu comprobante</strong> en el chat de WhatsApp y envíalo.</li>
          <li><strong>Espera la confirmación</strong> — activaremos tu acceso en un máximo de 24 horas.</li>
        </ol>
      </div>
    </div>

    <!-- AVISO 24 HRS -->
    <div class="notice">
      <div class="notice-icon">⏰</div>
      <div class="notice-text">
        <strong>Activación en máximo 24 horas.</strong> Una vez que recibamos tu comprobante, verificaremos el pago y activaremos tu acceso al curso. Si realizas el pago en horario nocturno, tu cuenta se activará a primera hora del siguiente día hábil.
      </div>
    </div>

    <!-- BOTÓN WHATSAPP -->
    <button class="wa-btn" onclick="sendWhatsApp('${waNumber}', \`${waMsg.replace(/`/g, '\\`')}\`)">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <path d="M16 3C9.373 3 4 8.373 4 15c0 2.385.668 4.61 1.824 6.51L4 29l7.698-1.804A12.93 12.93 0 0016 28c6.627 0 12-5.373 12-12S22.627 3 16 3z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.2"/>
        <path d="M11.5 11.5c.2-.5.8-1 1.4-1h.6c.4 0 .8.3 1 .7l.8 2c.2.4.1.9-.2 1.2l-.5.5c.6 1.1 1.5 2 2.6 2.6l.5-.5c.3-.3.8-.4 1.2-.2l2 .8c.4.2.7.6.7 1v.6c0 .6-.5 1.2-1 1.4-2.5.8-6.5-1-8.2-5.3-.4-1-.5-2.1-.4-3.1l.5-.7z" fill="white"/>
      </svg>
      <div>
        Enviar comprobante por WhatsApp
        <span class="wa-btn-sub">Se abrirá WhatsApp con el mensaje ya preparado</span>
      </div>
    </button>

    <!-- SECURITY -->
    <div class="security-row">
      <div class="sec-badge">🔒 Pago 100% seguro</div>
      <div class="sec-badge">✓ Acceso inmediato tras verificación</div>
      <div class="sec-badge">🎓 Certificado incluido</div>
    </div>
  `;
}

window.copyText = function(id, btn) {
  const val = document.getElementById(id)?.textContent?.trim();
  if (!val || val === '—') return;
  navigator.clipboard.writeText(val).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  });
};

window.sendWhatsApp = function(number, msg) {
  const url = `https://wa.me/${number}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
};

function showError(title, sub) {
  document.getElementById('pageContent').innerHTML = `
    <div class="error-state">
      <div class="error-icon">😕</div>
      <div class="error-title">${title}</div>
      <div class="error-sub">${sub}</div>
      <a class="btn-back" href="dashboard.html">← Volver al dashboard</a>
    </div>`;
}
</script>
</body>
</html>
