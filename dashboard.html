<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KÜ AKADEMIE — Mis Cursos</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7c6af7;--purple-dim:#5548c8;--purple-light:rgba(124,106,247,0.12);
  --teal:#4ecdc4;--bg:#0a0b10;--surface:#11121a;--surface2:#181926;--surface3:#1e2035;
  --border:#1e2035;--border2:#252640;--text:#e8e8f0;--muted:#6b6d8a;--muted2:#3a3d58;
  --green:#4caf82;--green-light:rgba(76,175,130,0.12);--amber:#f0b942;--red:#e05555;
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:50;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:16px;height:56px;
}
.tb-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.tb-icon{width:28px;height:28px;border-radius:50%;border:2px solid var(--purple);position:relative;flex-shrink:0}
.tb-icon::before{content:'';position:absolute;width:13px;height:1.5px;background:var(--teal);border-radius:1px;transform:rotate(-35deg);top:8px;left:3px}
.tb-icon::after{content:'';position:absolute;width:9px;height:1.5px;background:var(--purple);border-radius:1px;transform:rotate(-35deg);bottom:8px;right:3px}
.tb-brand{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#fff}
.tb-brand em{font-style:normal;color:var(--purple)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer;flex-shrink:0}
.tb-name{font-size:13px;color:var(--muted)}
.tb-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.tb-btn:hover{border-color:var(--red);color:var(--red)}

/* CART ICON TOPBAR */
.tb-cart-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  height: 32px;
  padding: 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
}
.tb-cart-btn:hover { border-color: var(--purple); background: var(--purple-light); }
.tb-cart-count {
  background: var(--purple);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:40px 28px}

/* WELCOME */
.welcome{margin-bottom:40px}
.welcome-greeting{font-size:13px;color:var(--muted);margin-bottom:6px}
.welcome-title{font-family:'Sora',sans-serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:8px}
.welcome-sub{font-size:14px;color:var(--muted)}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:48px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-value{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:#fff}
.stat-value em{font-style:normal;color:var(--purple)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:#fff}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* COURSES GRID */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:48px}

.course-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;position:relative;
  transition:transform .2s,border-color .2s;
}
.course-card.unlocked{cursor:pointer}
.course-card.unlocked:hover{transform:translateY(-4px);border-color:var(--border2)}
.course-card.locked-card{opacity:1;cursor:default}

.course-thumb{
  height:160px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1a1040,#0d1a2e);
  display:flex;align-items:center;justify-content:center;
}
.course-thumb img{width:100%;height:100%;object-fit:cover;object-position:center center;position:absolute;top:0;left:0}
.course-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(10,11,16,.8))}

.course-progress-bar{
  position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1)
}
.course-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width .5s}

/* Lock overlay para locked-card */
.lock-overlay-new{
  position:absolute;inset:0;background:rgba(10,11,16,.52);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:14px;gap:8px;backdrop-filter:blur(2px);
}
.lock-badge-txt{font-size:10px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.5px}

.course-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;margin-top:8px}
.price-old{font-size:12px;color:var(--muted2);text-decoration:line-through}
.price-now{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:#fff}

.acquire-btn{width:100%;background:var(--purple);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.acquire-btn:hover{background:var(--purple-dim)}
.btn-detail-link{width:100%;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.btn-detail-link:hover{border-color:var(--border2);color:var(--text)}

.course-badge{
  position:absolute;top:12px;left:12px;z-index:2;
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;
}
.badge-active{background:var(--green-light);color:var(--green);border:1px solid rgba(76,175,130,.3)}
.badge-locked{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12)}

.course-body{padding:16px}
.course-cat{font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:5px}
.course-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:#fff;margin-bottom:6px;line-height:1.4}
.course-instructor{font-size:12px;color:var(--muted);margin-bottom:12px}
.course-meta{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.course-pct{font-size:12px;color:var(--purple);font-weight:500}
.course-lessons{font-size:11px;color:var(--muted2)}
.continue-btn{
  display:flex;align-items:center;gap:6px;background:var(--purple);
  border:none;border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;
  font-size:12px;color:#fff;cursor:pointer;transition:background .2s;margin-top:12px;width:100%;justify-content:center;
}
.continue-btn:hover{background:var(--purple-dim)}

/* FLOATING CHECKOUT BUTTON */
.float-checkout-btn {
  position: fixed;
  bottom: 100px;
  right: 24px;
  background: linear-gradient(135deg, var(--purple), var(--purple-dim));
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px 24px;
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  font-weight: 700;
  display: none; /* Se activa por JS */
  align-items: center;
  gap: 12px;
  box-shadow: 0 10px 30px rgba(124, 106, 247, 0.4);
  cursor: pointer;
  z-index: 1000;
  animation: float-in .3s ease-out;
  text-decoration: none;
}
@keyframes float-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.float-checkout-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(124, 106, 247, 0.5); }

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface2);border:1px solid var(--border2);border-radius:12px;
  padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:9999;
  transition:transform .3s;font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.4);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* LOADING */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:999;transition:opacity .4s;
}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid var(--surface3);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL DETALLE CURSO */
.course-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.course-detail-overlay.show{opacity:1;pointer-events:all}
.course-detail-modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;transform:scale(.96);transition:transform .2s;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.course-detail-modal::-webkit-scrollbar{width:4px}
.course-detail-modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.course-detail-overlay.show .course-detail-modal{transform:scale(1)}
.cdm-thumb{height:200px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a1040,#0d1a2e);display:flex;align-items:center;justify-content:center;border-radius:20px 20px 0 0}
.cdm-thumb img{width:100%;height:100%;object-fit:cover}
.cdm-close{position:absolute;top:14px;right:14px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cdm-body{padding:22px 24px 28px}
.cdm-cat{font-size:11px;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px}
.cdm-title{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.cdm-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
.cdm-meta span{font-size:12px;color:var(--muted)}
.cdm-desc{font-size:13px;color:rgba(232,232,240,.75);line-height:1.8;margin-bottom:20px}
.cdm-section-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:#fff;margin-bottom:10px}
.cdm-units{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.cdm-unit{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.cdm-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:16px}
.cdm-price-now{font-family:'Sora',sans-serif;font-size:28px;font-weight:700;color:#fff}
.cdm-acquire-btn{width:100%;background:var(--purple);border:none;border-radius:12px;padding:14px;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div class="tb-icon"></div>
    <span style="font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:#fff">KÜ <em style="font-style:normal;color:var(--purple)">Akademie</em></span>
  </div>
  <div class="loading-spinner"></div>
</div>

<div class="topbar">
  <a class="tb-logo" href="dashboard.html">
    <div class="tb-icon"></div>
    <span class="tb-brand">KÜ <em>Akademie</em></span>
  </a>
  <div class="tb-right">
    <a href="pago.html" class="tb-cart-btn">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tb-cart-count" id="cartCount">0</span>
    </a>
    <span class="tb-name" id="tbName">—</span>
    <div class="tb-avatar" id="tbAvatar">—</div>
    <button class="tb-btn" id="btnLogout">Salir</button>
  </div>
</div>

<a href="pago.html" class="float-checkout-btn" id="floatCheckout">
  <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zM3 6h18M16 10a4 4 0 01-8 0" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Finalizar Compra
</a>

<div class="main">
  <div class="welcome">
    <div class="welcome-greeting">Bienvenido de vuelta</div>
    <div class="welcome-title" id="welcomeTitle">¡Hola!</div>
    <div class="welcome-sub">Continúa donde lo dejaste o explora nuevos cursos.</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Cursos activos</div>
      <div class="stat-value" id="statActive">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Progreso general</div>
      <div class="stat-value" id="statProgress">0<em>%</em></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Lecciones</div>
      <div class="stat-value" id="statLessons">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Certificados</div>
      <div class="stat-value" id="statCerts">0</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Mis cursos</div>
  </div>
  <div class="courses-grid" id="myCoursesGrid"></div>

  <div class="section-header" style="margin-top: 40px;">
    <div class="section-title">Explorar más cursos</div>
  </div>
  <div class="courses-grid" id="exploreCoursesGrid"></div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot" id="toastDot"></div>
  <span id="toastMsg">Mensaje</span>
</div>

<div class="course-detail-overlay" id="courseDetailModal" onclick="if(event.target===this)closeCourseDetail()">
  <div class="course-detail-modal" id="cdmContent"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBEXEQArv1biBw-ZTQUt9QOsP4BalV8BIY",
  authDomain: "nexora-914f6.firebaseapp.com",
  projectId: "nexora-914f6",
  storageBucket: "nexora-914f6.firebasestorage.app",
  messagingSenderId: "1042987858149",
  appId: "1:1042987858149:web:f647c9e9caa0d8dee93c0c"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

let currentUser = null;
let studentData = null;

// LÓGICA DE CARRITO
let cart = JSON.parse(localStorage.getItem('ku_cart')) || [];

function updateCartUI() {
  const count = cart.length;
  document.getElementById('cartCount').textContent = count;
  const floatBtn = document.getElementById('floatCheckout');
  floatBtn.style.display = count > 0 ? 'flex' : 'none';
}

window.addToCart = function(courseId, e) {
  if (e) e.stopPropagation();
  const allCourses = window._exploreCoursesData || [];
  const course = allCourses.find(c => c.id === courseId);
  
  if (!course) return;

  if (cart.some(item => item.id === courseId)) {
    showToast("Este curso ya está en tu carrito", "#f0b942");
    return;
  }

  cart.push({
    id: course.id,
    title: course.title,
    price: course.price,
    imageUrl: course.imageUrl,
    emoji: course.emoji
  });

  localStorage.setItem('ku_cart', JSON.stringify(cart));
  updateCartUI();
  showToast("Curso añadido al carrito 🛒", "#7c6af7");
};

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  updateCartUI();

  try {
    const q = query(collection(db,'students'), where('email','==', user.email));
    const snap = await getDocs(q);
    if (!snap.empty) {
      studentData = { id: snap.docs[0].id, ...snap.docs[0].data() };
    }
  } catch(e) {}

  if (studentData) {
    const name = studentData.name || user.email;
    document.getElementById('welcomeTitle').textContent = `¡Hola, ${name.split(' ')[0]}!`;
    document.getElementById('tbName').textContent = name;
    document.getElementById('tbAvatar').textContent = name[0].toUpperCase();
  }

  await loadCourses();
  document.getElementById('loadingScreen').classList.add('hidden');
});

async function loadCourses() {
  try {
    const snap = await getDocs(query(collection(db,'courses'), where('status','==','published')));
    const allCourses = snap.docs.map(d => ({id:d.id, ...d.data()}));
    const assignedCourses = studentData?.courses || [];

    const myCourses = allCourses.filter(c => assignedCourses.includes(c.id) || assignedCourses.includes(c.title));
    const exploreCourses = allCourses.filter(c => !assignedCourses.includes(c.id) && !assignedCourses.includes(c.title));

    renderMyCourses(myCourses);
    renderExploreCourses(exploreCourses);
    
    document.getElementById('statActive').textContent = myCourses.length;
  } catch(e) { console.error(e); }
}

function renderMyCourses(courses) {
  const grid = document.getElementById('myCoursesGrid');
  grid.innerHTML = courses.map(c => `
    <div class="course-card unlocked" onclick="enterCourse('${c.id}','${c.title}')">
      <div class="course-thumb">
        ${c.imageUrl ? `<img src="${c.imageUrl}">` : `<div style="font-size:40px">${c.emoji||'📚'}</div>`}
        <div class="course-thumb-overlay"></div>
        <div class="course-badge badge-active">Activo</div>
      </div>
      <div class="course-body">
        <div class="course-title">${c.title}</div>
        <button class="continue-btn">Ir al aula</button>
      </div>
    </div>
  `).join('');
}

function renderExploreCourses(courses) {
  window._exploreCoursesData = courses;
  const grid = document.getElementById('exploreCoursesGrid');
  grid.innerHTML = courses.map(c => `
    <div class="course-card locked-card">
      <div class="course-thumb">
        ${c.imageUrl ? `<img src="${c.imageUrl}">` : `<div style="font-size:40px">${c.emoji||'📚'}</div>`}
        <div class="lock-overlay-new">
          <div class="lock-badge-txt">BLOQUEADO</div>
        </div>
      </div>
      <div class="course-body">
        <div class="course-title">${c.title}</div>
        <div class="price-now">${c.price || 'Consultar'}</div>
        <button class="acquire-btn" onclick="addToCart('${c.id}', event)">🛒 Añadir al carrito</button>
        <button class="btn-detail-link" onclick="openCourseDetail('${c.id}', event)">👁 Detalles</button>
      </div>
    </div>
  `).join('');
}

window.enterCourse = (id, title) => {
  sessionStorage.setItem('nx_currentCourse', JSON.stringify({id, title}));
  window.location.href = 'aula.html';
};

window.openCourseDetail = function(id, e) {
  if (e) e.stopPropagation();
  const c = window._exploreCoursesData.find(x => x.id === id);
  if (!c) return;
  document.getElementById('cdmContent').innerHTML = `
    <div class="cdm-thumb">${c.imageUrl ? `<img src="${c.imageUrl}">` : `<div style="font-size:60px">${c.emoji||'📚'}</div>`}</div>
    <div class="cdm-body">
      <div class="cdm-title">${c.title}</div>
      <div class="cdm-desc">${c.desc || 'Sin descripción disponible.'}</div>
      <div class="cdm-price-now">${c.price || 'Consultar'}</div>
      <button class="cdm-acquire-btn" onclick="addToCart('${c.id}'); closeCourseDetail();">🛒 Añadir al carrito</button>
    </div>
  `;
  document.getElementById('courseDetailModal').classList.add('show');
};

window.closeCourseDetail = () => document.getElementById('courseDetailModal').classList.remove('show');

document.getElementById('btnLogout').onclick = async () => {
  await signOut(auth);
  window.location.href = 'login.html';
};

function showToast(msg, color) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastDot').style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
